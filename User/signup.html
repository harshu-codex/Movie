<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- Bootstrap Css -->
  <link rel="stylesheet" href="./assets/Bootstrap/css/bootstrap.min.css">
  <!-- Font Awesome Css -->
  <link rel="stylesheet" href="./assets/Font Awesome/css/all.min.css">
  <!-- Common Css -->
  <link rel="stylesheet" href="./css/common.css">
</head>

<body>
  <main>
    <section id="signup">
      <div class="d-flex justify-content-center align-items-center pt-5">
        <div class="user-box bg-dark rounded-3 m-5 p-5 shadow-lg">
          <div class="text-center mb-4 pb-1">
            <h2 class="fs-3 fw-bloder mb-2 text-info">Create Account</h2>
          </div>
          <form action="">
            <div class="form-row">
              <div class="mb-4">
                <label class="d-block fw-medium mb-2" for="first-name">First Name</label>
                <input type="text" id="first-name"
                  class="form-control w-100 p-2 rounded-1 border border-white bg-secondary border-danger text-light"
                  placeholder="First name" required>
              </div>
              <div class="mb-4">
                <label class="d-block fw-medium mb-2" for="last-name">Last Name</label>
                <input type="text" id="last-name"
                  class="form-control w-100 p-2 rounded-1 border border-white bg-secondary border-danger text-light"
                  placeholder="Last name" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="d-block fw-medium mb-2" for="signup-email">Email Address</label>
              <input type="email" id="signup-email"
                class="form-control w-100 p-2 rounded-1 border border-white bg-secondary border-danger text-light"
                placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
              <label class="d-block fw-medium mb-2" for="signup-password">Password</label>
              <input type="password" id="signup-password"
                class="form-control w-100 p-2 rounded-1 border border-white bg-secondary border-danger text-light"
                placeholder="Create a password" required>
            </div>
            <div class="mb-4">
              <label class="d-block fw-medium mb-2" for="confirm-password">Confirm Password</label>
              <input type="password" id="confirm-password"
                class="form-control w-100 p-2 rounded-1 border border-white bg-secondary border-danger text-light"
                placeholder="Confirm your password" required>
            </div>
            <div class="mb-4">
              <input type="checkbox" id="terms" required>
              <label class="d-inline ms-1" for="terms">I agree to the <a href="#" style="color: var(--accent);">Terms of
                  Service</a> and <a href="#" style="color: var(--accent);">Privacy
                  Policy</a></label>
            </div>
            <button type="submit" class="btn btn bg-primary text-light w-100 p-2 fs-6 mt-2">Create Account</button>
          </form>
          <div class="user-footer text-center mt-3 pt-1 text-danger">
            <p>Already have an account? <a href="#" class="text-info text-decoration-none fw-medium">Sign in here</a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
