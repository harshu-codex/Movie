<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Cinema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Common Css -->
  <link rel="stylesheet" href="../css/common.css">
  <!-- Add Cinema Css -->
  <link rel="stylesheet" href="../css/addcinema.css">
  <!-- Bootstrap Css -->
  <link rel="stylesheet" href="./assets/Bootstrap/css/bootstrap.min.css">
</head>

<body>
  <section>
    <div class="modal mt-5 d-flex" id="cinemaModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h3 class="modal-title">Add New Cinema</h3>
            <button class="close-btn" id="closeCinemaModal">&times;</button>
          </div>
          <div class="modal-body">
            <form id="cinemaForm">
              <div class="form-group">
                <label class="form-lable" for="cinemaName">Cinema Name</label>
                <input type="text" class="form-controll" id="cinemaName" placeholder="Enter cinema name" required>
              </div>
              <div class="form-group">
                <label class="form-lable" for="cinemaLocation">Location</label>
                <input type="text" class="form-controll" id="cinemaLocation" placeholder="Enter cinema location"
                  required>
              </div>
              <div class="form-group">
                <label class="form-lable">Facilities</label>
                <div class="checkbox-group">
                  <div class="checkbox-item">
                    <input type="checkbox" id="facility1" value="3D">
                    <label class="text-info" for="facility1">3D Projection</label>
                  </div>
                  <div class="checkbox-item">
                    <input type="checkbox" id="facility2" value="Dolby">
                    <label class="text-info" for="facility2">Dolby Sound</label>
                  </div>
                  <div class="checkbox-item">
                    <input type="checkbox" id="facility3" value="Food">
                    <label class="text-info" for="facility3">Food Court</label>
                  </div>
                  <div class="checkbox-item">
                    <input type="checkbox" id="facility4" value="Parking">
                    <label class="text-info" for="facility4">Free Parking</label>
                  </div>
                  <div class="checkbox-item">
                    <input type="checkbox" id="facility5" value="Wheelchair">
                    <label class="text-info" for="facility5">Wheelchair Access</label>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <input type="file" id="fileInput" accept="image/*" required>
                <label class="form-lable">Cinema Image</label>
                <div class="image-upload" id="uploadBox">
                  <p id="uploadText">Click to upload Cinema image</p>
                  <img id="preview" alt="Uploaded image preview">
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btnn btn-secondry" id="cancelCinema">Cancel</button>
                <button type="submit" class="btnn btn-primar">Add Cinema</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="./assets/Bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    // Click box → trigger file input
    uploadBox.addEventListener('click', () => fileInput.click());

    // Show preview when file is chosen
    fileInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
          uploadText.style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
</body>

</html>
