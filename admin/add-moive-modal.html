<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Common Css -->
    <link rel="stylesheet" href="../css/common.css">
    <!-- Add Movie CSS -->
     <link rel="stylesheet" href="../css/addmovie.css">
    <!-- Bootstrap Css -->
    <link rel="stylesheet" href="./assets/Bootstrap/css/bootstrap.min.css">
</head>

<body>
    <section>
        <div class="modal mt-5 d-flex" id="movieModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Add New Movie</h3>
                        <button class="close-btn" id="closemovieModal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="movieForm">
                            <div class="form-group">
                                <label class="form-lable" for="movieName">Movie Name</label>
                                <input type="text" class="form-controll" id="movieName" placeholder="Enter movie name"
                                    required>
                            </div>
                            <div class="form-group">
                                <label class="form-lable" for="movieLocation">Description</label>
                                <input type="text" class="form-controll" id="movieLocation"
                                    placeholder="Enter movie Description" required>
                            </div>
                            <div>
                                <label class="form-lable" for="movieLocation">Select Cinema</label>
                                <select class="form-select form-controll" name="Select Cinema" required>
                                    <option>Select Cinema</option>
                                    <option value="1">Inox</option>
                                    <option value="2">Rajhans</option>
                                    <option value="3">Imperial</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-lable" for="movieLocation">Select Time</label>
                                <select class="form-select form-controll" name="Select Time" required>
                                    <option>Select Time</option>
                                    <option value="1">12:15 PM To 3:10 PM</option>
                                    <option value="2">3:15 PM To 5:20 PM</option>
                                    <option value="3">5:25 PM To 8:30 PM</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="file" id="fileInput" accept="image/*" required>
                                <label class="form-lable">Movie Image</label>
                                <div class="image-upload" id="uploadBox">
                                    <p id="uploadText">Click to upload Movie image</p>
                                    <img id="preview" alt="Uploaded image preview">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btnn btn-secondry" id="cancelmovie">Cancel</button>
                                <button type="submit" class="btnn btn-primar">Add Movie</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="./assets/Bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        // Click box → trigger file input
        uploadBox.addEventListener('click', () => fileInput.click());

        // Show preview when file is chosen
        fileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    uploadText.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
