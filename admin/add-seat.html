<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Seats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Common Css -->
    <link rel="stylesheet" href="../css/common.css">
    <!-- Add Movie CSS -->
    <link rel="stylesheet" href="../css/addmovie.css">
    <!-- Bootstrap Css -->
    <link rel="stylesheet" href="./assets/Bootstrap/css/bootstrap.min.css">
</head>

<body>
    <section>
        <div class="model mt-5" id="movieModel">
            <div class="model-dialog">
                <div class="model-content">
                    <div class="model-header">
                        <h3 class="model-title">Add Seats</h3>
                        <button class="close-btn" id="closemovieModel">&times;</button>
                    </div>
                    <div class="model-body">
                        <form id="movieForm">
                            <div>
                                <label class="form-lable" for="movieLocation">Select Cinema</label>
                                <select class="form-select form-controll" name="Select Cinema" required>
                                    <option>Select Cinema</option>
                                    <option value="1">Inox</option>
                                    <option value="2">Rajhans</option>
                                    <option value="3">Imperial</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-lable" for="movieLocation">Select Cinema</label>
                                <select class="form-select form-controll" name="Select Cinema" required>
                                    <option>Select Moive</option>
                                    <option value="1">The Imposter</option>
                                    <option value="2">Detactive</option>
                                    <option value="3">The Bhoot</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-lable" for="movieLocation">Select Time</label>
                                <select class="form-select form-controll" name="Select Time" required>
                                    <option>Select Show's Time</option>
                                    <option value="1">12:15 PM To 3:10 PM</option>
                                    <option value="2">3:15 PM To 5:20 PM</option>
                                    <option value="3">5:25 PM To 8:30 PM</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-lable">Seat's Count</label>
                                <input type="text" class="form-controll" placeholder="How Many Seats?">
                            </div>
                            <div class="form-group mb-5">
                                <label class="form-lable">Seat's Price</label>
                                <input type="text" class="form-controll" placeholder="Price Per Seat?">
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btnn btn-secondry" id="cancelmovie">Cancel</button>
                                <button type="submit" class="btnn btn-primar">Add Seat</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="./assets/Bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        // Click box → trigger file input
        uploadBox.addEventListener('click', () => fileInput.click());

        // Show preview when file is chosen
        fileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    uploadText.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
